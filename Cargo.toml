[package]
name = "z-queue"
version = "0.1.0"
edition = "2024"

[[bench]]
name = "queue_bench"
harness = false

[features]
default = ["std"]

hardware-lock-elision = ["parking_lot/hardware-lock-elision"]
send_guard = ["parking_lot/send_guard"]

std = ["arrayvec/std", "event-listener/std", "crossbeam-utils/std", "crossbeam-queue/std", "indexmap/std"]
parking = ["event-listener/parking"]

rand = ["dep:rand"]
fastrand = ["dep:fastrand"]

wal = ["std"]

[dependencies]
parking_lot = "0.12"
arrayvec = { version = "0.7", default-features = false }
event-listener = { version = "5.4", default-features = false }
crossbeam-utils = { version = "0.8", default-features = false }
crossbeam-queue = { version = "0.3", default-features = false, features = ["alloc"] }

boxcar = "0.2"
indexmap = { version = "2.13", default-features = false }
foldhash = { version = "0.2", default-features = false }

rand = { version = "0.10", optional = true }
fastrand = { version = "2.3", optional = true }

[dev-dependencies]
criterion = { version = "0.8", features = ["async_tokio"] }
tokio = { version = "1", features = ["full"] }
flume = "0.12"
crossbeam-channel = "0.5"
